# distribution-design.md §3.2 に準拠
# タグ v* をプッシュすると自動でリリースビルド＋GitHub Release を作成
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from tag annotation
        id: tag_notes
        shell: bash
        run: |
          NOTES=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          if [ -z "$NOTES" ]; then
            NOTES="このリリースの変更点は git log を参照してください。"
          fi
          {
            echo "notes<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'v__VERSION__'
          releaseBody: ${{ steps.tag_notes.outputs.notes }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Calculate SHA256 hashes
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/hashes"
          echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]' | while IFS= read -r f; do
            f="${f//\\//}"
            case "$f" in
              *.msi|*.AppImage|*.deb)
                if [ -f "$f" ]; then
                  HASH=$(sha256sum "$f" | cut -d' ' -f1)
                  NAME=$(basename "$f")
                  echo "${HASH}  ${NAME}" >> "$RUNNER_TEMP/hashes/hash.txt"
                fi
                ;;
            esac
          done

      - name: Upload hash artifact
        uses: actions/upload-artifact@v4
        with:
          name: hashes-${{ matrix.platform }}
          path: ${{ runner.temp }}/hashes/hash.txt
          if-no-files-found: warn

  append-checksums:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download hash artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hashes-*
          merge-multiple: true
          path: /tmp/hashes

      - name: Append SHA256 checksums to release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HASHES=$(sort /tmp/hashes/hash.txt 2>/dev/null)
          if [ -z "$HASHES" ]; then
            echo "No hash files found, skipping."
            exit 0
          fi
          CURRENT_BODY=$(gh release view "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --json body -q .body)
          {
            printf '%s\n' "$CURRENT_BODY"
            printf '\n## SHA256 チェックサム\n\n'
            printf 'ダウンロードしたファイルの整合性を確認できます。\n\n'
            printf '```\n'
            printf '%s\n' "$HASHES"
            printf '```\n\n'
            printf '**Windows:** `certutil -hashfile MarkWeave_*.msi SHA256`\n'
            printf '**Linux:** `sha256sum MarkWeave_*.AppImage`\n'
          } > /tmp/release_notes.md
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --notes-file /tmp/release_notes.md
